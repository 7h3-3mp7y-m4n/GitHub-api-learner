name: Update Stats

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: "1.25"

      - name: Fetch workflow data
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api repos/urunc-dev/urunc/actions/workflows \
            --paginate > workflows_raw.json

          echo "{}" > runs_raw.json

          jq -r '.workflows[].id' workflows_raw.json | while read wf_id; do
            echo "Processing workflow ID: $wf_id"

            gh api "repos/urunc-dev/urunc/actions/workflows/${wf_id}/runs?per_page=20" \
              > runs_tmp.json

            # echo "===== runs_tmp.json ====="
            # cat runs_tmp.json

            jq --arg id "$wf_id" \
              --slurpfile runs runs_tmp.json \
              '. + {($id): $runs[0]}' \
              runs_raw.json > tmp.json

            # echo "===== tmp.json ====="
            # cat tmp.json

            mv tmp.json runs_raw.json
          done

          echo "===== FINAL workflows_raw.json ====="
          cat workflows_raw.json

          echo "===== FINAL runs_raw.json ====="
          cat runs_raw.json

          rm -f runs_tmp.json

      - name: Generate stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run .

      - name: Cleanup temp files
        run: rm -f workflows_raw.json runs_raw.json tmp.json

      - name: Commit changes if needed
        run: |
          if git diff --quiet stats.json; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "update stats"
          git push