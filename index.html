<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>urunc CI Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h1>urunc CI Dashboard</h1>
    </div>
    <div class="header-meta" id="header-meta">Loading...</div>
  </div>

  <div id="error-box" style="display:none" class="error"></div>

  <!-- health summary -->
  <div class="health-bar" id="health-bar">
    <div>
      <div class="health-score" id="health-score">—</div>
      <div class="health-label">Overall Health</div>
    </div>
    <div class="health-divider"></div>
    <div class="health-stat">
      <div class="health-stat-value" id="stat-workflows">—</div>
      <div class="health-stat-label">workflows</div>
    </div>
    <div class="health-stat">
      <div class="health-stat-value" id="stat-required">—</div>
      <div class="health-stat-label">required passing</div>
    </div>
    <div class="health-stat">
      <div class="health-stat-value" id="stat-failing">—</div>
      <div class="health-stat-label">currently failing</div>
    </div>
  </div>

  <!-- workflow table -->
  <div class="section-title">Workflows</div>
  <table class="workflow-table">
    <thead>
      <tr>
        <th>Workflow</th>
        <th>Last Run</th>
        <th>Failure Rate</th>
        <th>History (oldest → newest)</th>
        <th>Avg Duration</th>
        <th>Link</th>
      </tr>
    </thead>
    <tbody id="workflow-tbody">
      <tr>
        <td colspan="6" class="loading">Loading workflow data...</td>
      </tr>
    </tbody>
  </table>

  <footer>
    <span>
      Data from
      <a href="https://github.com/urunc-dev/urunc" target="_blank">urunc-dev/urunc</a>
      auto-updates every 1 hours
    </span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
